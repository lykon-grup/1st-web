<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy of Science</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Premium Dark Theme Matching Previous Pages */
        body {
            background-color: #141414;
            color: #ffffff;
            padding-bottom: 50px;
        }

        /* Clean Modern Navbar */
        nav {
            background-color: #1e1e1e;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #0284c7; /* Premium Blue divider */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        /* Modern Button Styling */
        nav a {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            background-color: #2d2d2d;
            padding: 12px 30px;
            margin: 0 12px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            border: 1px solid #444;
            transition: all 0.3s ease;
        }

        /* Hover Effect: Glowing Blue Button */
        nav a:hover {
            background-color: #0284c7;
            color: #ffffff;
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        /* Centered Hero Section Layout */
        .hero-section {
            max-width: 800px;
            margin: 60px auto 40px auto;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            color: #a1a1aa; /* Light Gray text */
            font-size: 1.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        /* Optimized Text Size - Fixed 88px bug for Mobile */
        p.academy-title {
            font-size: 4.5rem; /* Large and bold on PC */
            font-weight: 700;
            color: #38bdf8; /* Soft Electric Blue matching previous design */
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            line-height: 1.2;
            margin-bottom: 40px;
        }

        /* Ordered List Container */
        .features-box {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 40px 40px 40px 60px; /* Left padding for list numbers */
            border-radius: 20px;
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        li {
            color: #e2e8f0;
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.6;
            font-weight: 500;
        }

        /* Blue numbers styling for list */
        ol {
            color: #38bdf8;
            font-weight: 700;
        }

        li::marker {
            font-size: 1.4rem;
        }

        li:last-child {
            margin-bottom: 0;
        }

        /* --------------------------------------
           MOBILE & TABLET RESPONSIVE FIX
        -------------------------------------- */
        @media (max-width: 768px) {
            .hero-section {
                margin: 40px auto 20px auto;
            }

            h1 {
                font-size: 1.4rem;
            }

            p.academy-title {
                font-size: 2.8rem; /* Mobile par automatic chota ho jayega */
            }

            nav a {
                padding: 10px 22px;
                font-size: 0.95rem;
                margin: 0 6px;
            }

            .features-box {
                margin: 0 15px;
                padding: 30px 30px 30px 45px;
            }

            li {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>  

    <!-- Navigation Bar with Premium Buttons -->
    <nav>
        <a href="sir.html">Teachers</a>
        <a href="student.html">Students</a>
    </nav>

    <!-- Main Section -->
    <div class="hero-section">
        <h1>Welcome to</h1>
        <p class="academy-title">Science Academy</p>
        
        <!-- Features Cards List -->
        <div class="features-box">
            <ol>
                <li>Best Science & IT Education</li>
                <li>Experienced & Friendly Teachers</li>
                <li>Daily Practical & Conceptual Classes</li>
            </ol>
        </div>
    </div>
    
</body>
</html>
