<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <style>
        /* Global Styles */
        body {
            background-color: #121212; 
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 25px 0;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-bottom: 3px solid #ff4757; 
        }

        header h1 {
            color: #ff4757; 
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 1px;
            padding: 0 15px;
        }

        /* Main Container */
        main {
            max-width: 850px;
            width: 90%;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
            gap: 25px; 
        }

        /* Profile Card - Modern Flex Layout */
        .student-card {
            background-color: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: row; /* Desktop par side-by-side */
            align-items: center;
            padding: 20px;
            border: 1px solid #2d2d2d;
            gap: 25px;
        }

        /* Card Hover Effect */
        .student-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(255, 71, 87, 0.15);
            border-color: #ff4757;
        }

        /* Student Images */
        .student-card img {
            width: 100%;
            max-width: 220px; /* Desktop par image size normal rakhi hai */
            height: auto;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Student Info Text Wrapper */
        .card-info {
            flex: 1;
            text-align: left; /* Desktop par text left align hoga */
        }

        .student-card p {
            color: #e0e0e0;
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 0;
        }

        .student-card b {
            color: #ff4757; 
            font-size: 1.3rem;
        }

        .student-card i {
            color: #ffd700; /* Rich Gold */
            font-size: 1.3rem;
            font-style: normal;
            font-weight: bold;
        }

        /* ========================================== */
        /* MOBILE RESPONSIVE STYLES (Screen < 600px)  */
        /* ========================================== */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.6rem; /* Mobile par heading choti ho jaye */
            }

            main {
                width: 92%;
                margin: 20px auto;
                gap: 20px;
            }

            .student-card {
                flex-direction: column; /* Mobile par image upar, text neeche */
                text-align: center;
                padding: 15px;
                gap: 15px;
            }

            .card-info {
                text-align: center; /* Mobile par text center align ho jaye */
            }

            .student-card img {
                max-width: 100%; /* Mobile par image poori width le sakti hai */
                width: 100%;
            }

            .student-card p {
                font-size: 1.05rem; /* Mobile par readable text size */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to the Student Page</h1>
    </header>

    <main>
        <!-- Card 1: Anfal -->
        <div class="student-card">
            <img src="anfall.png" alt="Anfal Shah">
            <div class="card-info">
                <p>My name is <b>Anfal</b>. I am a student in the 10th grade.</p>
            </div>
        </div>

        <!-- Card 2: Rajab -->
        <div class="student-card">
            <img src="rajab.png" alt="Rajab Khan">
            <div class="card-info">
                <p style="font-style:italic">His name is <b style="color:gold">Rajab Khan</b>.
                 He is studying in the 9th grade.</p>
            </div>
        </div>

        <!-- Card 3: Sammad -->
        <div class="student-card">
            <img src="sammad.jpeg" alt="Sammad Joya">
            <div class="card-info">
                <p>My name is <b>Sammad Shakh</b>. I am a student in the 9th grade.</p>
            </div>
        </div>

        <!-- Card 4: Jahanzaib -->
        <div class="student-card">
            <img src="jahanzaib.jpeg" alt="Jahanzaib Khan">
            <div class="card-info">
                <p>My name is <b>Jahanzaib Khan</b>. I am a student in the 9th grade.</p>
            </div>
        </div>
    </main>

</body>
</html>
